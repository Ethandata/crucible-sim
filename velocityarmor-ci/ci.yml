name: CI

on:
  push:
    branches: [ "main", "test-velocityarmor" ]
  pull_request:
    branches: [ "main", "test-velocityarmor" ]

jobs:
  test:
    name: Pytest — Unit & Integration
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: velocityarmor-demo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml termcolor

      - name: Run test suite
        run: |
          pytest tests/test_scanner.py -v --tb=short
        # Fail-fast: pytest exits non-zero on any failure, which fails the job.

  yaml-lint:
    name: YAML Lint — rules.yaml
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: velocityarmor-demo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint rules.yaml
        run: |
          yamllint -d "{extends: relaxed, rules: {line-length: {max: 300}}}" rules.yaml
