<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crucible — Agent Leaderboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; line-height: 1.6; }
    header { background: #161b22; border-bottom: 1px solid #30363d; padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 1.5rem; color: #f0f6fc; font-weight: 700; }
    header .tagline { font-size: 0.85rem; color: #8b949e; }
    header .badge { background: #1f6feb; color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
    .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 40px; }
    .stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; text-align: center; }
    .stat-card .value { font-size: 2.5rem; font-weight: 700; color: #58a6ff; }
    .stat-card .label { font-size: 0.85rem; color: #8b949e; margin-top: 4px; }
    .section-title { font-size: 1.2rem; font-weight: 600; color: #f0f6fc; margin-bottom: 16px; border-bottom: 1px solid #30363d; padding-bottom: 8px; }
    table { width: 100%; border-collapse: collapse; background: #161b22; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; margin-bottom: 40px; }
    thead { background: #21262d; }
    th { padding: 12px 16px; text-align: left; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; color: #8b949e; font-weight: 600; }
    td { padding: 12px 16px; border-top: 1px solid #30363d; font-size: 0.9rem; }
    tr:hover td { background: #21262d; }
    .phi-bar { display: flex; align-items: center; gap: 8px; }
    .phi-fill { height: 8px; border-radius: 4px; background: linear-gradient(90deg, #1f6feb, #58a6ff); }
    .phi-num { font-weight: 600; color: #f0f6fc; min-width: 35px; }
    .rank-badge { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 50%; font-weight: 700; font-size: 0.85rem; }
    .rank-1 { background: #b8860b; color: #fff; }
    .rank-2 { background: #808080; color: #fff; }
    .rank-3 { background: #8b4513; color: #fff; }
    .rank-n { background: #30363d; color: #8b949e; }
    .pass { color: #3fb950; font-weight: 600; }
    .fail { color: #f85149; font-weight: 600; }
    .tag { display: inline-block; background: #1f6feb22; color: #58a6ff; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; border: 1px solid #1f6feb44; }
    .empty-state { text-align: center; padding: 60px 20px; color: #8b949e; }
    .empty-state h3 { color: #f0f6fc; margin-bottom: 8px; font-size: 1.1rem; }
    .empty-state code { display: inline-block; margin-top: 16px; background: #21262d; border: 1px solid #30363d; border-radius: 6px; padding: 12px 20px; font-size: 0.8rem; color: #a5d6ff; text-align: left; white-space: pre; }
    .refresh-btn { float: right; background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
    .refresh-btn:hover { background: #30363d; }
    .loading { text-align: center; color: #8b949e; padding: 40px; }
    footer { text-align: center; padding: 40px 20px; color: #484f58; font-size: 0.8rem; border-top: 1px solid #21262d; }
    footer a { color: #58a6ff; text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Crucible Leaderboard</h1>
      <div class="tagline">Agent trace submissions ranked by Phi score</div>
    </div>
    <span class="badge">LIVE</span>
  </header>
  <div class="container">
    <div class="stats-row">
      <div class="stat-card"><div class="value" id="stat-runs">-</div><div class="label">Total Runs</div></div>
      <div class="stat-card"><div class="value" id="stat-agents">-</div><div class="label">Unique Agents</div></div>
      <div class="stat-card"><div class="value" id="stat-avg">-</div><div class="label">Avg Phi Score</div></div>
      <div class="stat-card"><div class="value" id="stat-pass">-</div><div class="label">Pass Rate</div></div>
    </div>
    <div class="section-title">Top Submissions <button class="refresh-btn" onclick="loadLeaderboard()">Refresh</button></div>
    <div id="leaderboard-wrap"><div class="loading">Loading leaderboard...</div></div>
    <div class="section-title">Recent Runs</div>
    <div id="recent-wrap"><div class="loading">Loading recent runs...</div></div>
  </div>
  <footer>Powered by <a href="https://www.crucible-ai.net" target="_blank">Crucible</a> - API: <a href="https://crucible-sim-production.up.railway.app/health" target="_blank">crucible-sim-production.up.railway.app</a></footer>
  <script>
    const API = 'https://crucible-sim-production.up.railway.app';
    async function loadLeaderboard() {
      try {
        const [lbRes, recentRes] = await Promise.all([
          fetch(API + '/api/leaderboard?limit=25'),
          fetch(API + '/api/runs?limit=10')
        ]);
        const lb = await lbRes.json();
        const recent = await recentRes.json();
        renderLeaderboard(lb.leaderboard || []);
        renderRecent(recent.runs || []);
        updateStats(lb);
      } catch(e) {
        document.getElementById('leaderboard-wrap').innerHTML = '<div class="empty-state"><h3>Could not connect to API</h3><p>' + e.message + '</p></div>';
      }
    }
    function updateStats(lb) {
      const runs = lb.leaderboard || [];
      const total = lb.total || runs.length;
      const agents = new Set(runs.map(r => r.agent_name)).size;
      const avg = runs.length ? (runs.reduce((s,r) => s + (r.phi||0), 0) / runs.length).toFixed(1) : '-';
      const passed = runs.filter(r => (r.phi||0) >= 75).length;
      const rate = runs.length ? Math.round(passed/runs.length*100) + '%' : '-';
      document.getElementById('stat-runs').textContent = total;
      document.getElementById('stat-agents').textContent = agents || '-';
      document.getElementById('stat-avg').textContent = avg;
      document.getElementById('stat-pass').textContent = rate;
    }
    function renderLeaderboard(rows) {
      const wrap = document.getElementById('leaderboard-wrap');
      if (!rows.length) {
        wrap.innerHTML = '<div class="empty-state"><h3>No submissions yet</h3><p>Be the first to submit an agent trace!</p><code>curl -X POST ' + API + '/api/submit \
  -H "Authorization: Bearer YOUR_KEY" \
  -H "Content-Type: application/json" \
  -d @trace.json</code></div>';
        return;
      }
      let html = '<table><thead><tr><th>#</th><th>Agent</th><th>Team</th><th>Scenario</th><th>Phi Score</th><th>Status</th><th>Date</th></tr></thead><tbody>';
      rows.forEach((r, i) => {
        const rc = i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-n';
        const phi = r.phi || 0;
        const pass = phi >= 75;
        const date = r.submitted_at ? new Date(r.submitted_at).toLocaleDateString() : '-';
        html += '<tr><td><span class="rank-badge ' + rc + '">' + (i+1) + '</span></td>';
        html += '<td><strong>' + esc(r.agent_name||'-') + '</strong></td>';
        html += '<td><span class="tag">' + esc(r.team||'-') + '</span></td>';
        html += '<td>' + esc(r.scenario_id||'-') + '</td>';
        html += '<td><div class="phi-bar"><div class="phi-fill" style="width:' + Math.min(phi,100) + 'px"></div><span class="phi-num">' + phi + '</span></div></td>';
        html += '<td class="' + (pass?'pass':'fail') + '">' + (pass?'PASS':'FAIL') + '</td>';
        html += '<td>' + date + '</td></tr>';
      });
      html += '</tbody></table>';
      wrap.innerHTML = html;
    }
    function renderRecent(runs) {
      const wrap = document.getElementById('recent-wrap');
      if (!runs.length) { wrap.innerHTML = '<div class="empty-state"><h3>No runs yet</h3></div>'; return; }
      let html = '<table><thead><tr><th>Agent</th><th>Team</th><th>Scenario</th><th>Phi</th><th>Status</th><th>Failures</th><th>Date</th></tr></thead><tbody>';
      runs.forEach(r => {
        const phi = r.phi || 0;
        const pass = phi >= 75;
        const failures = (r.failure_codes||[]).join(', ') || '-';
        const date = r.submitted_at ? new Date(r.submitted_at).toLocaleDateString() : '-';
        html += '<tr><td>' + esc(r.agent_name||'-') + '</td>';
        html += '<td><span class="tag">' + esc(r.team||'-') + '</span></td>';
        html += '<td>' + esc(r.scenario_id||'-') + '</td>';
        html += '<td class="phi-num">' + phi + '</td>';
        html += '<td class="' + (pass?'pass':'fail') + '">' + (pass?'PASS':'FAIL') + '</td>';
        html += '<td style="color:#8b949e;font-size:0.8rem">' + esc(failures) + '</td>';
        html += '<td>' + date + '</td></tr>';
      });
      html += '</tbody></table>';
      wrap.innerHTML = html;
    }
    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    loadLeaderboard();
    setInterval(loadLeaderboard, 30000);
  </script>
</body>
</html>
